<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OT 전략 리포트 허브 — Antigravity</title>
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: rgba(255,255,255,0.08);
      --text: #f0f0f0;
      --text-secondary: #888;
      --accent: #3b82f6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

    header { padding: 48px 40px 32px; border-bottom: 1px solid var(--border); }
    header h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.02em; }
    header p { color: var(--text-secondary); margin-top: 6px; font-size: 0.9rem; }

    .container { max-width: 1200px; margin: 0 auto; padding: 40px; }

    .section-head {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 24px; padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .section-head h2 { font-size: 1.1rem; font-weight: 600; }
    .section-meta {
      font-size: 0.8rem; color: var(--text-secondary);
      background: rgba(255,255,255,0.06);
      padding: 2px 10px; border-radius: 20px;
    }

    .report-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .report-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      text-decoration: none;
      color: var(--text);
      display: flex; flex-direction: column;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    }
    .report-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: 0 12px 30px rgba(0,0,0,0.3);
    }
    .card-thumb {
      height: 120px;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.2rem;
      position: relative;
    }
    .card-thumb-label {
      position: absolute; bottom: 8px; right: 10px;
      font-size: 0.7rem; color: rgba(255,255,255,0.5);
      letter-spacing: 0.05em;
    }
    .card-body { padding: 16px; flex: 1; display: flex; flex-direction: column; }
    .card-tags { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
    .tag {
      font-size: 0.7rem; padding: 2px 8px; border-radius: 20px;
      font-weight: 500;
    }
    .tag.blue { background: rgba(59,130,246,0.15); color: #60a5fa; }
    .tag.green { background: rgba(16,185,129,0.15); color: #34d399; }
    .card-title { font-size: 0.95rem; font-weight: 600; margin-bottom: 6px; line-height: 1.4; }
    .card-desc { font-size: 0.8rem; color: var(--text-secondary); line-height: 1.6; flex: 1; }
    .card-footer {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border);
    }
    .card-date { font-size: 0.75rem; color: var(--text-secondary); }
    .card-status {
      font-size: 0.7rem; padding: 2px 8px; border-radius: 20px;
      background: rgba(16,185,129,0.15); color: #34d399;
    }

    footer {
      padding: 32px 40px; border-top: 1px solid var(--border);
      font-size: 0.75rem; color: var(--text-secondary); text-align: center;
    }
  </style>
</head>
<body>

  </div>

</html>
